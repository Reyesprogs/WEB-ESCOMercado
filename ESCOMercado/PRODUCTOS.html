<!DOCTYPE html>
<html lang="es">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,200..800;1,200..800&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRODUCTOS - ESCOMercado</title>
    <link rel="icon" type="image/png" href="IMAGENES/ESCOMercado.png">
    <link rel="stylesheet" href="CSS/css_producto.css">
</head>
<body>
    <header id="navbar">
        <button class="btn-nav" onclick="window.location.href='INICIO.html'">Inicio</button>
        <div class="logo-box">
            <center>
                <img src="IMAGENES/ESCOMercado.png" class="img-logo" alt="Logo">
            </center>
        </div>
        <button class="btn-nav">Contacto</button>
    </header>
    <main>
        <div class="container">
            <h2 class="main-title">Catálogo Global de Productos</h2>
        </div>
        <div class="seccion-navegacion">
            <button onclick="moverIzquierda()" class="flecha"> ❮ </button>
            
            <div class="visor-botones" id="visor">
                <div id="contenedor-dinamico" class="fila-larga">
                    
                    <button class="boton-item" onclick="window.location.href='PRODUCTO1.html?id=<?php echo $producto['id_producto']; ?>'">
                        <div class="category-card">
                            <div class="card-content">
                                <span class="card-tag">Nuevo / <?php echo $producto['categoria']; ?></span>
                                <h3 class="card-title"><?php echo $producto['titulo']; ?></h3>
                                <p class="card-subtitle">$<?php echo $producto['precio']; ?> MXN</p>
                            </div>
                            <img src="<?php echo $producto['ruta_imagen_principal']; ?>" alt="Producto">
                        </div>
                    </button>

                    </div>
            </div>
            
            <button onclick="moverDerecha()" class="flecha"> ❯ </button>
        </div>
    </main>
    <script>
        const visor = document.getElementById('visor');

        function moverDerecha() {
            visor.scrollLeft += visor.offsetWidth;
        }

        function moverIzquierda() {
            visor.scrollLeft -= visor.offsetWidth;
        }
    </script>
</body>
</html>
